<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Still Love Me? ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      position: relative;
    }

    h1 {
      font-size: 2em;
      margin-bottom: 30px;
    }

    .buttons {
      position: relative;
      height: 200px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      position: absolute;
      transition: all 0.2s ease;
    }

    #yes {
      background: white;
      color: #ff6b81;
      left: 35%;
    }

    #no {
      background: #ff6b81;
      color: white;
      left: 55%;
    }

    #result {
      display: none;
      margin-top: 30px;
      font-size: 1.5em;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Do you still love me? ❤️</h1>

  <div class="buttons">
    <button id="yes" onclick="sayYes()">Yes 💖</button>
    <button id="no">No 😈</button>
  </div>

  <div id="result">
    I knew you still love me, princess ❤️👑
  </div>
</div>

<script>
let yesSize = 16;

const noBtn = document.getElementById("no");

// fungsi kabur
function moveNo() {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 100);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  // YES makin gede
  yesSize += 4;
  document.getElementById("yes").style.fontSize = yesSize + "px";
}

// PC (hover)
noBtn.addEventListener("mouseover", moveNo);

// HP (touch)
noBtn.addEventListener("touchstart", moveNo);

function sayYes() {
  document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
